name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate manifest.json
        run: node -e "require('./manifest.json'); console.log('manifest OK')"
      - name: Run caption-core unit tests
        run: node test/captions.test.js
